<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 포인트 내역</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/Common.css">
  <link rel="stylesheet" href="/css/SideBar.css">
  <link rel="stylesheet" href="/css/MyPointHistory.css">
</head>
<body>
  <div class="app">

    <!-- 메인 콘텐츠 -->
    <div class="content">
      <header class="hd">
        <div class="hd-name">내 포인트 내역</div>
      </header>

      <div class="main">
        <div class="panel">
          <table class="history-table">
            <thead>
              <tr>
                <th>날짜</th>
                <th>유형</th>
                <th>내용</th>
                <th>포인트 변화</th>
              </tr>
            </thead>
            <!-- JS가 /history API를 호출하여 채움 -->
            <tbody id="history-list-body">
              <tr>
                <td colspan="4" class="text-center">불러오는 중...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 사이드바 -->
    <aside class="right-sidebar">
      <div class="user-info">
        <a href="/members/logout" class="logout-btn">로그아웃</a>
        <h2 class="user-name" id="studentName">이름</h2>
        <p id="studentClassInfo">학년 반 번</p>
        <p class="point-info" id="studentPoints">보유 포인트 : -P</p>
      </div>

      <div class="round-box">
        <p>장 운영중</p>
      </div>

      <nav class="sidebar-menu">
        <button class="menu-button" onclick="location.href='/asset/'">내 자산</button>
        <button class="menu-button" onclick="location.href='/stock/list'">주식 목록</button>
        <button class="menu-button" onclick="location.href='/news/'">뉴스 목록</button>
        <button class="menu-button active" onclick="location.href='/history'">내 포인트 내역</button>
        <button class="menu-button" onclick="location.href='/coupons/'">쿠폰 상점</button>
      </nav>
    </aside>

  </div>

  <script>
    // TODO: API 호출로 포인트 내역 렌더링
    // fetch('/history')
    //   .then(res => res.json())
    //   .then(data => renderHistory(data));
  </script>
</body>
</html>
