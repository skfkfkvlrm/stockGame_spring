<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모의 투자 시스템 — 로그인</title>
  <link rel="stylesheet" href="/css/Login.css">
</head>
<body>
  <div class="login-container">
    <h1 class="project-name">SchoolStock</h1>

    <!-- 서버에서 에러 메시지를 주입할 영역 (현재는 정적 placeholder) -->
    <div class="error-msg" id="error-msg" style="display:none;"></div>

    <form method="post" action="/members/login">
      <div class="login-form">
        <div class="input-group">
          <div class="input-row">
            <label for="studentId">아이디 :</label>
            <input type="text" id="studentId" name="studentId" />
          </div>
          <div class="input-row">
            <label for="password">비밀번호 :</label>
            <input type="password" id="password" name="password" />
          </div>
        </div>
        <button type="submit" class="login-button">로그인</button>
      </div>
    </form>

    <div class="html-button">
      <a href="/members/join">회원가입</a>
    </div>
  </div>
</body>
</html>
