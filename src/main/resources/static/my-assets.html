<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 자산 관리</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/Common.css">
  <link rel="stylesheet" href="/css/SideBar.css">
  <link rel="stylesheet" href="/css/MyAssetStyle.css">
</head>
<body>
  <div class="app">

    <!-- 메인 콘텐츠 -->
    <div class="content">
      <header class="hd">
        <div class="hd-name">내 자산</div>
      </header>

      <div class="main">
        <!-- 요약 카드 (JS가 /api/asset/dashboard 호출하여 채움) -->
        <div class="summary-container">
          <div class="card">
            <span class="label">총 자산</span>
            <div class="value" id="total-assets">— P</div>
          </div>
          <div class="card">
            <span class="label">보유 포인트</span>
            <div class="value" id="total-points">— P</div>
          </div>
          <div class="card">
            <span class="label">총 손익</span>
            <div class="value" id="total-profit">— P</div>
          </div>
          <div class="card" onclick="location.href='/coupons/my-coupons'" style="cursor: pointer;">
            <span class="label">보유 쿠폰</span>
            <div class="value" id="coupon-count">— 개</div>
          </div>
        </div>

        <!-- 보유 주식 테이블 -->
        <div class="panel">
          <div class="table-header">
            <h3>보유 주식 상세</h3>
            <button type="button" class="refresh-all-btn" onclick="updateAllStocks()">🔄</button>
          </div>
          <table id="stock-table">
            <thead>
              <tr>
                <th>주식명</th>
                <th>보유수량</th>
                <th>현재가격</th>
                <th>평균단가</th>
                <th>총 구매 비용</th>
                <th>수익금</th>
              </tr>
            </thead>
            <!-- JS(my-asset-script.js)가 /api/asset/dashboard 호출하여 채움 -->
            <tbody id="stock-list">
              <tr>
                <td colspan="6" class="text-center">불러오는 중...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 사이드바 -->
    <aside class="right-sidebar">
      <div class="user-info">
        <a href="/members/logout" class="logout-btn">로그아웃</a>
        <h2 class="user-name" id="studentName">이름</h2>
        <p id="studentClassInfo">학년 반 번</p>
        <p class="point-info" id="studentPoints">보유 포인트 : -P</p>
      </div>

      <div class="round-box">
        <p>장 운영중</p>
      </div>

      <nav class="sidebar-menu">
        <button class="menu-button active" onclick="location.href='/asset/'">내 자산</button>
        <button class="menu-button" onclick="location.href='/stock/list'">주식 목록</button>
        <button class="menu-button" onclick="location.href='/news/'">뉴스 목록</button>
        <button class="menu-button" onclick="location.href='/history'">내 포인트 내역</button>
        <button class="menu-button" onclick="location.href='/coupons/'">쿠폰 상점</button>
      </nav>
    </aside>

  </div>

  <script src="/js/my-asset-script.js"></script>
</body>
</html>
