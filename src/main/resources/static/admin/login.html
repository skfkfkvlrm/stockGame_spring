<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인 — SchoolStock</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', sans-serif;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 48px 40px;
      width: 380px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .badge {
      display: inline-block;
      background: linear-gradient(90deg, #6c63ff, #3ecfcf);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    h1 {
      color: #fff;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      margin-bottom: 32px;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .alert-error {
      background: rgba(255, 77, 77, 0.2);
      border: 1px solid rgba(255, 77, 77, 0.4);
      color: #ff6b6b;
    }

    .alert-success {
      background: rgba(62, 207, 207, 0.15);
      border: 1px solid rgba(62, 207, 207, 0.35);
      color: #3ecfcf;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #6c63ff;
      box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.2);
    }

    input::placeholder { color: rgba(255, 255, 255, 0.3); }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(90deg, #6c63ff, #3ecfcf);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.15s;
    }

    .login-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .login-btn:active { transform: translateY(0); }

    .footer-note {
      margin-top: 24px;
      text-align: center;
      color: rgba(255, 255, 255, 0.3);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <span class="badge">Admin Panel</span>
    <h1>관리자 로그인</h1>
    <p class="subtitle">SchoolStock 운영/관리자 전용 페이지입니다.</p>

    <!-- 에러 메시지 (th:if 또는 서버사이드 렌더링 시 활성화) -->
    <div id="error-alert" class="alert alert-error" style="display:none;"></div>
    <div id="logout-alert" class="alert alert-success" style="display:none;"></div>

    <!--
      Spring Security Form Login 처리:
      loginProcessingUrl = "/admin/login-process"
      usernameParameter  = "username"
      passwordParameter  = "password"
    -->
    <form id="login-form" method="post" action="/admin/login-process">
      <div class="form-group">
        <label for="username">아이디</label>
        <input type="text" id="username" name="username"
               placeholder="관리자 아이디 입력" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password"
               placeholder="비밀번호 입력" autocomplete="current-password" required />
      </div>
      <button type="submit" class="login-btn">로그인</button>
    </form>

    <p class="footer-note">SchoolStock &copy; 2025 — Authorized Personnel Only</p>
  </div>

  <script>
    // URL 파라미터로 에러/로그아웃 메시지 처리
    const params = new URLSearchParams(location.search);
    if (params.get('error') !== null) {
      const el = document.getElementById('error-alert');
      el.textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
      el.style.display = 'block';
    }
    if (params.get('logout') !== null) {
      const el = document.getElementById('logout-alert');
      el.textContent = '로그아웃 되었습니다.';
      el.style.display = 'block';
    }
  </script>
</body>
</html>
