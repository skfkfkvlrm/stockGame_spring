<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 대시보드 — SchoolStock</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
    }

    /* ── 사이드바 ─────────────────────────────────────── */
    .sidebar {
      width: 240px;
      background: linear-gradient(180deg, #1a1d2e, #12141f);
      border-right: 1px solid rgba(255,255,255,0.07);
      display: flex;
      flex-direction: column;
      padding: 32px 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
    }

    .sidebar-logo {
      padding: 0 24px 32px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .sidebar-logo h2 {
      font-size: 18px;
      font-weight: 800;
      background: linear-gradient(90deg, #6c63ff, #3ecfcf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sidebar-logo p {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      margin-top: 4px;
    }

    .sidebar-nav { padding: 24px 12px; flex: 1; }

    .nav-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      padding: 0 12px;
      margin-bottom: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s, color 0.2s;
      cursor: pointer;
    }

    .nav-item:hover, .nav-item.active {
      background: rgba(108, 99, 255, 0.15);
      color: #fff;
    }

    .nav-icon { font-size: 16px; width: 20px; text-align: center; }

    .sidebar-footer {
      padding: 16px 24px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .logout-btn {
      width: 100%;
      padding: 10px;
      background: rgba(255, 77, 77, 0.15);
      border: 1px solid rgba(255, 77, 77, 0.3);
      border-radius: 8px;
      color: #ff6b6b;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: block;
      transition: background 0.2s;
    }

    .logout-btn:hover { background: rgba(255, 77, 77, 0.25); }

    /* ── 메인 콘텐츠 ──────────────────────────────────── */
    .main {
      margin-left: 240px;
      flex: 1;
      padding: 40px;
    }

    .page-header {
      margin-bottom: 32px;
    }

    .page-header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
    }

    .page-header p {
      color: rgba(255,255,255,0.45);
      font-size: 13px;
      margin-top: 4px;
    }

    /* ── 요약 카드 ────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 24px;
      transition: transform 0.2s;
    }

    .stat-card:hover { transform: translateY(-2px); }

    .stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
    }

    .stat-accent { color: #6c63ff; }

    /* ── 역할 배지 ────────────────────────────────────── */
    .role-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .role-admin {
      background: rgba(108, 99, 255, 0.2);
      color: #6c63ff;
      border: 1px solid rgba(108, 99, 255, 0.4);
    }

    .role-manager {
      background: rgba(62, 207, 207, 0.15);
      color: #3ecfcf;
      border: 1px solid rgba(62, 207, 207, 0.3);
    }
  </style>
</head>
<body>

  <!-- 사이드바 -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <h2>SchoolStock</h2>
      <p>관리자 패널</p>
    </div>

    <div class="sidebar-nav">
      <div class="nav-label">메뉴</div>
      <a class="nav-item active" href="/admin/dashboard">
        <span class="nav-icon">📊</span> 대시보드
      </a>
      <a class="nav-item" href="/admin/students">
        <span class="nav-icon">👨‍🎓</span> 학생 관리
      </a>
      <a class="nav-item" href="/admin/stocks">
        <span class="nav-icon">📈</span> 종목 관리
      </a>
      <a class="nav-item" href="/admin/coupons">
        <span class="nav-icon">🎫</span> 쿠폰 관리
      </a>
    </div>

    <div class="sidebar-footer">
      <!-- Spring Security 로그아웃: POST /admin/logout -->
      <form method="post" action="/admin/logout">
        <button type="submit" class="logout-btn">로그아웃</button>
      </form>
    </div>
  </nav>

  <!-- 메인 콘텐츠 -->
  <main class="main">
    <div class="page-header">
      <h1>
        대시보드
        <!-- 역할은 JS나 서버사이드에서 주입 -->
        <span id="role-badge" class="role-badge role-admin" style="font-size:13px; vertical-align: middle;">ADMIN</span>
      </h1>
      <p>환영합니다, <strong id="username-display">admin</strong>님.</p>
    </div>

    <!-- 요약 통계 (추후 API 연동) -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">전체 학생 수</div>
        <div class="stat-value stat-accent" id="total-students">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">등록 종목 수</div>
        <div class="stat-value" id="total-stocks">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">오늘 거래 건수</div>
        <div class="stat-value" id="today-transactions">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">총 쿠폰 수</div>
        <div class="stat-value" id="total-coupons">—</div>
      </div>
    </div>

    <p style="color: rgba(255,255,255,0.3); font-size: 13px;">
      ※ 통계 데이터는 추후 API 연동 후 자동으로 표시됩니다.
    </p>
  </main>

  <script>
    // TODO: 로그인한 관리자 정보를 Security Context에서 받아 표시
    // 서버사이드 렌더링(Thymeleaf)으로 교체 시 th:text="${username}" 등으로 바인딩
  </script>
</body>
</html>
