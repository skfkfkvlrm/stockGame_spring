<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 제목은 JS가 API 응답 받은 뒤 document.title로 동적 설정 -->
  <title>주식 상세정보</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/StockStyle.css">
  <link rel="stylesheet" href="/css/Common.css">
  <link rel="stylesheet" href="/css/SideBar.css">
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
  <!-- stockId는 URL 파라미터(?stockId=1) 또는 경로(/stock/1)에서 JS가 파싱 -->
  <div class="app">

    <!-- 왼쪽 콘텐츠 구역 -->
    <div class="content">
      <header class="hd">
        <input id="backBtn" class="back-btn" type="button" value="뒤로" onclick="history.back();" />
        <div class="hd-name">주식 상세정보</div>
      </header>

      <div class="stock">
        <div class="stock-info">
          <h2 id="stockName">—</h2>
          <p id="stockContent">—</p>
        </div>
        <div class="stock-price" id="stockPriceBox" data-prev-price="" data-stock-id="">
          <div class="price-now" id="priceNow">—P</div>
          <div class="price-change" id="priceChange"></div>
          <div class="price-base" id="priceBase">—P</div>
        </div>
      </div>

      <!-- 메인 구역 -->
      <div class="main">

        <!-- 등록된 주문 현황 -->
        <div class="panel">
          <div class="ptitle">
            등록된 주문 현황
            <select id="orderTypeSelect">
              <option value="sell" selected>매도</option>
              <option value="buy">매수</option>
            </select>
          </div>
          <table class="table table-hover">
            <thead>
              <tr>
                <th>종류</th>
                <th>가격(P)</th>
                <th>수량</th>
              </tr>
            </thead>
            <tbody id="orderListBody">
              <!-- JS(order-status.js)가 /api/stock/live-orders 호출하여 채움 -->
            </tbody>
          </table>
        </div>

        <!-- 내 주문 -->
        <div class="panel">
          <div class="ptitle">
            <span>내 요청 주문</span>
            <input type="button" id="refreshBtn" value="조회" />
          </div>
          <table class="table table-hover">
            <thead>
              <tr>
                <th>종류</th>
                <th>가격(P)</th>
                <th>수량</th>
                <th>날짜</th>
                <th>취소</th>
              </tr>
            </thead>
            <tbody id="myOrderListBody">
              <!-- JS(order-status.js)가 /api/stock/waiting-orders 호출하여 채움 -->
            </tbody>
          </table>
        </div>

        <!-- 매도/매수 주문 입력 -->
        <div class="panel">
          <div class="ptitle">주문 요청하기</div>
          <div class="sell-request">
            <div>가격(P)</div>
            <input id="sellPrice" type="number" min="100" step="100" value="100" />
            <div>수량</div>
            <input id="sellAmount" type="number" min="1" value="1" />
            <div>
              <button id="sellBtn" class="sell-btn">매도</button>
            </div>
          </div>

          <div class="buy-request">
            <div>가격(P)</div>
            <input id="buyPrice" type="number" min="100" step="100" value="100" />
            <div>수량</div>
            <input id="buyAmount" type="number" min="1" value="1" />
            <div>
              <button id="buyBtn" class="buy-btn">매수</button>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- 사이드바 -->
    <aside class="right-sidebar">
      <div class="user-info">
        <a href="/members/logout" class="logout-btn">로그아웃</a>
        <h2 class="user-name" id="studentName">이름</h2>
        <p id="studentClassInfo">학년 반 번</p>
        <p class="point-info" id="studentPoints">보유 포인트 : -P</p>
      </div>

      <div class="round-box">
        <p>장 운영중</p>
      </div>

      <nav class="sidebar-menu">
        <button class="menu-button" onclick="location.href='/asset/'">내 자산</button>
        <button class="menu-button" onclick="location.href='/stock/list'">주식 목록</button>
        <button class="menu-button" onclick="location.href='/news/'">뉴스 목록</button>
        <button class="menu-button" onclick="location.href='/history'">내 포인트 내역</button>
        <button class="menu-button" onclick="location.href='/coupons/'">쿠폰 상점</button>
      </nav>
    </aside>

  </div>

  <!-- 매수/매도 결과 메시지는 JS가 alert() 또는 toast로 처리 -->
  <div id="flash-message" style="display:none;"></div>

  <script src="/js/order-status.js"></script>
</body>
</html>
